spring:
  application:
    name: cardiovet

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cardiovet}
    username: ${DB_USERNAME:cardiovet}
    password: ${DB_PASSWORD:cardiovet}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}

# Configuracoes da aplicacao CardioVet
cardiovet:
  security:
    jwt:
      # Em producao defina via variavel de ambiente. Chave base64 de >= 256 bits.
      secret: ${JWT_SECRET:Y2FyZGlvdmV0LWRldi1zZWNyZXQta2V5LXBsZWFzZS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi0xMjM0NTY3ODkw}
      # Tempo de expiracao do token de acesso em milissegundos (padrao: 8 horas)
      expiration-ms: ${JWT_EXPIRATION_MS:28800000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
